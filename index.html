<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SeeWord, a fun little word game</title>
<meta name="description" content="Slide letters into lines, trace them to score. A fun little word game for iPhone and iPad.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #7998af;
    color: #fff;
    display: flex;
    flex-direction: column;
    /* Fills the viewport exactly when everything fits (no scroll); grows
       and scrolls when it can't, so the footer NEVER overlaps content. */
    min-height: 100dvh;
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(32px, 6vw, 88px);
    padding: 24px;
  }
  .phone {
    flex-shrink: 0;
    width: min(320px, 36dvh, 60vw);
    padding: 13px;
    border-radius: 18.5%/8.6%;
    background: #222b33;
    box-shadow: 0 30px 70px rgba(20, 40, 55, 0.45);
  }
  .phone img {
    display: block;
    width: 100%;
    border-radius: 15.5%/7%;
  }
  .pitch { max-width: 380px; }
  .appicon {
    display: block;
    width: 74px;
    /* iOS icon corner curvature. */
    border-radius: 22.5%;
    margin-bottom: 20px;
    box-shadow: 0 10px 24px rgba(20, 40, 55, 0.3);
  }
  .logo {
    font-size: clamp(44px, 6vw, 64px);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .logo .see { font-weight: 100; }
  .logo .word { font-weight: 800; color: #f8ac4c; }
  .blurb {
    margin-top: 14px;
    font-size: clamp(16px, 1.6vw, 19px);
    line-height: 1.38;
    color: rgba(255, 255, 255, 0.92);
  }
  .store {
    display: inline-flex;
    align-items: center;
    gap: 11px;
    margin-top: 28px;
    padding: 11px 22px 11px 18px;
    border-radius: 14px;
    background: #16202a;
    color: #fff;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 10px 26px rgba(20, 40, 55, 0.35);
  }
  .store:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(20, 40, 55, 0.45); }
  .store svg { width: 26px; height: 30px; fill: #fff; }
  .store .lines { display: flex; flex-direction: column; line-height: 1.15; text-align: left; }
  .store .small { font-size: 11px; opacity: 0.85; }
  .store .big { font-size: 19px; font-weight: 600; }
  footer {
    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.18);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.75);
  }
  footer a {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
  }
  footer a:hover { color: #fff; }
  @media (max-width: 640px) {
    main { flex-direction: column; gap: 26px; text-align: center; }
    .phone { width: min(240px, 32dvh, 58vw); }
    .pitch { max-width: 320px; }
    .appicon { width: 64px; margin: 0 auto 16px; }
    .store { margin-top: 20px; }
  }
</style>
</head>
<body>
<main>
  <div class="phone">
    <img src="screenshot.png" alt="SeeWord gameplay: the word SEE traced and highlighted across the board">
  </div>
  <div class="pitch">
    <img class="appicon" src="appicon.png" alt="SeeWord app icon">
    <h1 class="logo"><span class="see">SEE</span><span class="word">WORD</span></h1>
    <p class="blurb">A fun little word game. Slide letters into lines,
    trace them to score, and collect every word you ever find.</p>
    <!-- Swap href for the real App Store URL at launch. -->
    <a class="store" href="#" aria-label="Download SeeWord on the App Store">
      <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
      <span class="lines">
        <span class="small">Download on the</span>
        <span class="big">App Store</span>
      </span>
    </a>
  </div>
</main>
<footer>
  <span>&copy; 2026 Wes Mason. All rights reserved.</span>
  <a href="privacy.html">Privacy policy</a>
</footer>
</body>
</html>
